<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Survival Round - Deluxe</title>
  <style>
    :root{
      --bg1:#081120;
      --bg2:#132238;
      --panel:#0f172a;
      --panel2:#172554;
      --line:#334155;
      --text:#e5eefc;
      --muted:#a9bdd8;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --gold:#facc15;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.16), transparent 25%),
        radial-gradient(circle at top right, rgba(250,204,21,.12), transparent 22%),
        linear-gradient(160deg,var(--bg1),var(--bg2));
      display:flex;
      justify-content:center;
      align-items:center;
      padding:16px;
    }

    .wrap{
      width:100%;
      max-width:950px;
      background:rgba(15,23,42,.94);
      border:2px solid rgba(148,163,184,.2);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .header{
      padding:22px 22px 14px;
      background:linear-gradient(135deg, rgba(30,41,59,.95), rgba(23,37,84,.88));
      border-bottom:1px solid rgba(148,163,184,.2);
    }

    .title{
      margin:0;
      text-align:center;
      font-size:clamp(2rem, 5vw, 3rem);
      color:var(--gold);
      letter-spacing:.5px;
      text-shadow:0 2px 10px rgba(250,204,21,.15);
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      margin-top:8px;
      font-size:1rem;
    }

    .hud{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      padding:16px 18px 0;
    }

    .stat{
      background:rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.18);
      border-radius:18px;
      padding:14px 12px;
      text-align:center;
      font-weight:bold;
      font-size:1rem;
    }

    .stat span{
      display:block;
      color:var(--accent);
      font-size:1.2rem;
      margin-top:4px;
    }

    .progress-shell{
      margin:16px 18px 0;
      background:#0b1220;
      border:1px solid rgba(148,163,184,.18);
      border-radius:999px;
      overflow:hidden;
      height:18px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      transition:width .35s ease;
    }

    .main{
      padding:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(11,18,32,.98));
      border:1px solid rgba(148,163,184,.18);
      border-radius:var(--radius);
      padding:22px;
      min-height:420px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .scenario{
      display:inline-block;
      align-self:flex-start;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(56,189,248,.12);
      border:1px solid rgba(56,189,248,.28);
      color:var(--accent);
      font-weight:bold;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.9rem;
      margin-bottom:16px;
    }

    .question{
      font-size:clamp(1.3rem, 3vw, 2rem);
      line-height:1.35;
      font-weight:800;
      margin-bottom:20px;
    }

    .answers{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .answer{
      border:none;
      border-radius:20px;
      padding:20px 16px;
      min-height:96px;
      background:linear-gradient(180deg, #1e293b, #111827);
      color:var(--text);
      border:2px solid rgba(148,163,184,.22);
      font-size:clamp(1rem, 2vw, 1.15rem);
      font-weight:800;
      cursor:pointer;
      transition:transform .08s ease, border-color .2s ease, box-shadow .2s ease, background .2s ease;
      box-shadow:0 8px 16px rgba(0,0,0,.15);
    }

    .answer:hover{
      transform:translateY(-2px) scale(1.01);
      border-color:rgba(56,189,248,.45);
      box-shadow:0 10px 20px rgba(0,0,0,.22);
    }

    .answer:active{
      transform:scale(.99);
    }

    .answer:disabled{
      cursor:default;
    }

    .answer.correct{
      background:linear-gradient(180deg, rgba(34,197,94,.26), rgba(16,185,129,.15));
      border-color:rgba(34,197,94,.95);
      box-shadow:0 0 0 3px rgba(34,197,94,.14);
    }

    .answer.wrong{
      background:linear-gradient(180deg, rgba(239,68,68,.25), rgba(127,29,29,.12));
      border-color:rgba(239,68,68,.95);
      box-shadow:0 0 0 3px rgba(239,68,68,.12);
    }

    .feedback{
      margin-top:18px;
      min-height:96px;
      border-radius:18px;
      padding:16px 18px;
      border:1px solid rgba(148,163,184,.18);
      background:#0b1220;
      color:var(--muted);
      font-size:1.05rem;
      line-height:1.5;
    }

    .feedback.good{
      border-color:rgba(34,197,94,.45);
      color:#dcfce7;
      animation:pop .25s ease;
    }

    .feedback.bad{
      border-color:rgba(239,68,68,.45);
      color:#fee2e2;
      animation:shake .25s ease;
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:14px 20px;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      min-width:150px;
      transition:transform .08s ease, filter .2s ease;
    }

    .btn:hover{ filter:brightness(1.06); }
    .btn:active{ transform:scale(.98); }

    .btn.primary{
      background:linear-gradient(90deg, var(--accent), #60a5fa);
      color:#062033;
    }

    .btn.secondary{
      background:#334155;
      color:var(--text);
    }

    .end{
      display:none;
      text-align:center;
      padding:22px 18px 28px;
    }

    .end.show{
      display:block;
    }

    .badge{
      display:inline-block;
      margin-top:10px;
      padding:12px 18px;
      border-radius:999px;
      background:rgba(250,204,21,.12);
      color:var(--gold);
      border:1px solid rgba(250,204,21,.28);
      font-size:1.2rem;
      font-weight:800;
    }

    .big-score{
      font-size:clamp(2rem, 6vw, 3.6rem);
      font-weight:900;
      color:var(--accent);
      margin:18px 0 8px;
    }

    .end p{
      color:var(--muted);
      font-size:1.06rem;
      max-width:650px;
      margin:0 auto 18px;
      line-height:1.5;
    }

    .flash{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:0;
    }

    .flash.good{ background:rgba(34,197,94,.08); }
    .flash.bad{ background:rgba(239,68,68,.08); }

    .flash.show{
      animation:flash .35s ease;
    }

    @keyframes flash{
      0%{opacity:0}
      20%{opacity:1}
      100%{opacity:0}
    }

    @keyframes pop{
      0%{transform:scale(.98)}
      100%{transform:scale(1)}
    }

    @keyframes shake{
      0%{transform:translateX(0)}
      25%{transform:translateX(-4px)}
      50%{transform:translateX(4px)}
      75%{transform:translateX(-2px)}
      100%{transform:translateX(0)}
    }

    @media (max-width: 720px){
      .hud{
        grid-template-columns:1fr;
      }

      .answers{
        grid-template-columns:1fr;
      }

      .card{
        min-height:auto;
      }

      .answer{
        min-height:84px;
      }
    }
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>

  <div class="wrap">
    <div class="header">
      <h1 class="title">Network Survival Round</h1>
      <div class="subtitle">Quick review game for phones, Chromebooks, laptops, and desktop browsers</div>
    </div>

    <div class="hud">
      <div class="stat">Question <span id="questionCount">1 / 6</span></div>
      <div class="stat">Score <span id="scoreCount">0</span></div>
      <div class="stat">Mission <span id="missionText">Save the Network</span></div>
    </div>

    <div class="progress-shell">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="main">
      <div id="gameScreen">
        <div class="card">
          <div>
            <div class="scenario" id="scenario">Scenario</div>
            <div class="question" id="question">Question text here</div>
            <div class="answers" id="answers"></div>
            <div class="feedback" id="feedback">Tap an answer to begin.</div>
          </div>

          <div class="controls">
            <button class="btn secondary" id="resetBtn">Reset Game</button>
          </div>
        </div>
      </div>

      <div class="end" id="endScreen">
        <div class="badge" id="endBadge">Mission Complete</div>
        <div class="big-score" id="finalScore">6 / 6</div>
        <p id="finalMessage"></p>
        <div class="controls">
          <button class="btn primary" id="playAgainBtn">Play Again</button>
          <button class="btn secondary" id="resetBtn2">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const originalQuestions = [
      {
        scenario: "The Mystery Connector",
        question: "A technician installs fiber optic cable but tries to plug it into an RJ45 port. Which connector should be used?",
        answers: ["RJ45", "ST", "BNC", "F connector"],
        correct: 1,
        explanation: "Fiber connectors include LC, SC, and ST. RJ45 is for twisted-pair Ethernet, not fiber."
      },
      {
        scenario: "The Lost Cable",
        question: "A cable disappears inside a wall and you must find where it terminates. Which tool should you use?",
        answers: ["Multimeter", "Cable crimper", "Tone generator and probe", "Loopback plug"],
        correct: 2,
        explanation: "A tone generator sends the signal, and the probe helps trace the cable path."
      },
      {
        scenario: "The Broadcast Storm",
        question: "A company network has too much broadcast traffic. What is the best solution?",
        answers: ["Add more switches", "Upgrade to Cat7", "Create VLANs", "Install a firewall"],
        correct: 2,
        explanation: "VLANs split up broadcast domains and reduce unnecessary broadcast traffic."
      },
      {
        scenario: "The Packet Mystery",
        question: "Data arrives at a switch. What data unit does the switch process?",
        answers: ["Segment", "Packet", "Frame", "Bit"],
        correct: 2,
        explanation: "Switches work at Layer 2 and process frames. Routers work at Layer 3 and process packets."
      },
      {
        scenario: "Public Web Server",
        question: "A company wants customers to access a web server while protecting the internal network. Where should the server go?",
        answers: ["LAN", "VLAN", "DMZ", "Private subnet only"],
        correct: 2,
        explanation: "A DMZ is the standard place for public-facing services that should be separated from the internal LAN."
      },
      {
        scenario: "Maximum Fault Tolerance",
        question: "Which topology provides the greatest fault tolerance because devices have multiple paths?",
        answers: ["Bus", "Star", "Ring", "Mesh"],
        correct: 3,
        explanation: "Mesh topology gives the most redundancy because devices have multiple possible communication paths."
      }
    ];

    const questionCount = document.getElementById("questionCount");
    const scoreCount = document.getElementById("scoreCount");
    const missionText = document.getElementById("missionText");
    const scenarioEl = document.getElementById("scenario");
    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const feedbackEl = document.getElementById("feedback");
    const progressBar = document.getElementById("progressBar");
    const gameScreen = document.getElementById("gameScreen");
    const endScreen = document.getElementById("endScreen");
    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");
    const endBadge = document.getElementById("endBadge");
    const resetBtn = document.getElementById("resetBtn");
    const resetBtn2 = document.getElementById("resetBtn2");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const flash = document.getElementById("flash");

    let questions = [];
    let current = 0;
    let score = 0;
    let locked = false;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildGameQuestions() {
      return shuffle(originalQuestions).map(q => {
        const indexed = q.answers.map((text, i) => ({ text, i }));
        const mixed = shuffle(indexed);
        const newCorrect = mixed.findIndex(item => item.i === q.correct);
        return {
          scenario: q.scenario,
          question: q.question,
          answers: mixed.map(item => item.text),
          correct: newCorrect,
          explanation: q.explanation
        };
      });
    }

    function updateHUD() {
      questionCount.textContent = `${Math.min(current + 1, questions.length)} / ${questions.length}`;
      scoreCount.textContent = score;
      const percent = (current / questions.length) * 100;
      progressBar.style.width = `${percent}%`;
    }

    function loadQuestion() {
      locked = false;
      const q = questions[current];
      updateHUD();
      scenarioEl.textContent = q.scenario;
      questionEl.textContent = q.question;
      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "Tap the best answer.";
      answersEl.innerHTML = "";

      q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.className = "answer";
        btn.innerHTML = `<strong>${String.fromCharCode(65 + index)}.</strong> ${answer}`;
        btn.addEventListener("click", () => selectAnswer(index, btn));
        answersEl.appendChild(btn);
      });
    }

    function showFlash(type) {
      flash.className = `flash ${type} show`;
      setTimeout(() => {
        flash.className = `flash ${type}`;
      }, 350);
    }

    function selectAnswer(index, clickedBtn) {
      if (locked) return;
      locked = true;

      const q = questions[current];
      const buttons = document.querySelectorAll(".answer");

      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add("correct");
      });

      if (index === q.correct) {
        score++;
        scoreCount.textContent = score;
        feedbackEl.className = "feedback good";
        feedbackEl.innerHTML = `✅ <strong>Correct.</strong> ${q.explanation}`;
        missionText.textContent = "System Stabilized";
        showFlash("good");
      } else {
        clickedBtn.classList.add("wrong");
        feedbackEl.className = "feedback bad";
        feedbackEl.innerHTML = `❌ <strong>Incorrect.</strong> ${q.explanation}`;
        missionText.textContent = "Warning Detected";
        showFlash("bad");
      }

      setTimeout(() => {
        current++;
        if (current < questions.length) {
          missionText.textContent = "Save the Network";
          loadQuestion();
        } else {
          finishGame();
        }
      }, 1700);
    }

    function finishGame() {
      progressBar.style.width = "100%";
      gameScreen.style.display = "none";
      endScreen.classList.add("show");
      finalScore.textContent = `${score} / ${questions.length}`;

      if (score === questions.length) {
        endBadge.textContent = "3/3 Mission Complete Energy";
        finalMessage.textContent = "Perfect run. You nailed fiber connectors, cable tracing, VLANs, Layer 2 frames, DMZ placement, and mesh topology.";
      } else if (score >= 4) {
        endBadge.textContent = "Network Hero";
        finalMessage.textContent = "Strong work. You are close to exam-ready. Review the missed concepts and run it one more time.";
      } else {
        endBadge.textContent = "Needs Another Attempt";
        finalMessage.textContent = "Good start. Focus on the differences between fiber and copper, frames and packets, and where a DMZ fits.";
      }

      missionText.textContent = "Mission Complete";
    }

    function resetGame() {
      questions = buildGameQuestions();
      current = 0;
      score = 0;
      scoreCount.textContent = "0";
      missionText.textContent = "Save the Network";
      gameScreen.style.display = "block";
      endScreen.classList.remove("show");
      loadQuestion();
    }

    resetBtn.addEventListener("click", resetGame);
    resetBtn2.addEventListener("click", resetGame);
    playAgainBtn.addEventListener("click", resetGame);

    resetGame();
  </script>
</body>
</html>
