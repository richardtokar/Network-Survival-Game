<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Weak Spots Challenge</title>
  <style>
    :root{
      --bg1:#081120;
      --bg2:#132238;
      --panel:#0f172a;
      --line:#334155;
      --text:#e5eefc;
      --muted:#a9bdd8;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --bad:#ef4444;
      --gold:#facc15;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.16), transparent 25%),
        radial-gradient(circle at top right, rgba(250,204,21,.12), transparent 22%),
        linear-gradient(160deg,var(--bg1),var(--bg2));
      display:flex;
      justify-content:center;
      align-items:center;
      padding:16px;
    }

    .wrap{
      width:100%;
      max-width:1000px;
      background:rgba(15,23,42,.95);
      border:2px solid rgba(148,163,184,.18);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .header{
      padding:22px 22px 14px;
      background:linear-gradient(135deg, rgba(30,41,59,.95), rgba(23,37,84,.88));
      border-bottom:1px solid rgba(148,163,184,.2);
    }

    .title{
      margin:0;
      text-align:center;
      font-size:clamp(2rem, 5vw, 3rem);
      color:var(--gold);
      letter-spacing:.4px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      margin-top:8px;
      font-size:1rem;
    }

    .hud{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      padding:16px 18px 0;
    }

    .stat{
      background:rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.18);
      border-radius:18px;
      padding:14px 12px;
      text-align:center;
      font-weight:bold;
      font-size:1rem;
    }

    .stat span{
      display:block;
      color:var(--accent);
      font-size:1.2rem;
      margin-top:4px;
    }

    .progress-shell{
      margin:16px 18px 0;
      background:#0b1220;
      border:1px solid rgba(148,163,184,.18);
      border-radius:999px;
      overflow:hidden;
      height:18px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      transition:width .35s ease;
    }

    .main{
      padding:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(11,18,32,.98));
      border:1px solid rgba(148,163,184,.18);
      border-radius:var(--radius);
      padding:22px;
      min-height:460px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .topic{
      display:inline-block;
      align-self:flex-start;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(56,189,248,.12);
      border:1px solid rgba(56,189,248,.28);
      color:var(--accent);
      font-weight:bold;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.85rem;
      margin-bottom:16px;
    }

    .question{
      font-size:clamp(1.25rem, 3vw, 2rem);
      line-height:1.35;
      font-weight:800;
      margin-bottom:20px;
    }

    .answers{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .answer{
      border:none;
      border-radius:20px;
      padding:20px 16px;
      min-height:92px;
      background:linear-gradient(180deg, #1e293b, #111827);
      color:var(--text);
      border:2px solid rgba(148,163,184,.22);
      font-size:clamp(1rem, 2vw, 1.12rem);
      font-weight:800;
      cursor:pointer;
      transition:transform .08s ease, border-color .2s ease, box-shadow .2s ease, background .2s ease;
      box-shadow:0 8px 16px rgba(0,0,0,.15);
    }

    .answer:hover{
      transform:translateY(-2px) scale(1.01);
      border-color:rgba(56,189,248,.45);
      box-shadow:0 10px 20px rgba(0,0,0,.22);
    }

    .answer:active{ transform:scale(.99); }
    .answer:disabled{ cursor:default; }

    .answer.correct{
      background:linear-gradient(180deg, rgba(34,197,94,.26), rgba(16,185,129,.15));
      border-color:rgba(34,197,94,.95);
      box-shadow:0 0 0 3px rgba(34,197,94,.14);
    }

    .answer.wrong{
      background:linear-gradient(180deg, rgba(239,68,68,.25), rgba(127,29,29,.12));
      border-color:rgba(239,68,68,.95);
      box-shadow:0 0 0 3px rgba(239,68,68,.12);
    }

    .feedback{
      margin-top:18px;
      min-height:92px;
      border-radius:18px;
      padding:16px 18px;
      border:1px solid rgba(148,163,184,.18);
      background:#0b1220;
      color:var(--muted);
      font-size:1.03rem;
      line-height:1.5;
    }

    .feedback.good{
      border-color:rgba(34,197,94,.45);
      color:#dcfce7;
      animation:pop .25s ease;
    }

    .feedback.bad{
      border-color:rgba(239,68,68,.45);
      color:#fee2e2;
      animation:shake .25s ease;
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:14px 20px;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      min-width:150px;
      transition:transform .08s ease, filter .2s ease;
    }

    .btn:hover{ filter:brightness(1.06); }
    .btn:active{ transform:scale(.98); }

    .btn.primary{
      background:linear-gradient(90deg, var(--accent), #60a5fa);
      color:#062033;
    }

    .btn.secondary{
      background:#334155;
      color:var(--text);
    }

    .end{
      display:none;
      text-align:center;
      padding:22px 18px 28px;
    }

    .end.show{ display:block; }

    .badge{
      display:inline-block;
      margin-top:10px;
      padding:12px 18px;
      border-radius:999px;
      background:rgba(250,204,21,.12);
      color:var(--gold);
      border:1px solid rgba(250,204,21,.28);
      font-size:1.2rem;
      font-weight:800;
    }

    .big-score{
      font-size:clamp(2rem, 6vw, 3.6rem);
      font-weight:900;
      color:var(--accent);
      margin:18px 0 8px;
    }

    .end p{
      color:var(--muted);
      font-size:1.06rem;
      max-width:720px;
      margin:0 auto 18px;
      line-height:1.5;
    }

    .flash{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:0;
    }

    .flash.good{ background:rgba(34,197,94,.08); }
    .flash.bad{ background:rgba(239,68,68,.08); }

    .flash.show{ animation:flash .35s ease; }

    @keyframes flash{
      0%{opacity:0}
      20%{opacity:1}
      100%{opacity:0}
    }

    @keyframes pop{
      0%{transform:scale(.98)}
      100%{transform:scale(1)}
    }

    @keyframes shake{
      0%{transform:translateX(0)}
      25%{transform:translateX(-4px)}
      50%{transform:translateX(4px)}
      75%{transform:translateX(-2px)}
      100%{transform:translateX(0)}
    }

    @media (max-width: 820px){
      .hud{ grid-template-columns:1fr 1fr; }
      .answers{ grid-template-columns:1fr; }
      .card{ min-height:auto; }
      .answer{ min-height:82px; }
    }

    @media (max-width: 520px){
      .hud{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>

  <div class="wrap">
    <div class="header">
      <h1 class="title">Network Weak Spots Challenge</h1>
      <div class="subtitle">10-question review game based on the class’s weakest concepts</div>
    </div>

    <div class="hud">
      <div class="stat">Question <span id="questionCount">1 / 10</span></div>
      <div class="stat">Score <span id="scoreCount">0</span></div>
      <div class="stat">Correct % <span id="percentCount">0%</span></div>
      <div class="stat">Mission <span id="missionText">Fix the Weak Spots</span></div>
    </div>

    <div class="progress-shell">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="main">
      <div id="gameScreen">
        <div class="card">
          <div>
            <div class="topic" id="topic">Topic</div>
            <div class="question" id="question">Question text here</div>
            <div class="answers" id="answers"></div>
            <div class="feedback" id="feedback">Tap the best answer to begin.</div>
          </div>

          <div class="controls">
            <button class="btn secondary" id="resetBtn">Reset Game</button>
          </div>
        </div>
      </div>

      <div class="end" id="endScreen">
        <div class="badge" id="endBadge">Mission Complete</div>
        <div class="big-score" id="finalScore">10 / 10</div>
        <p id="finalMessage"></p>
        <div class="controls">
          <button class="btn primary" id="playAgainBtn">Play Again</button>
          <button class="btn secondary" id="resetBtn2">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const originalQuestions = [
      {
        topic: "Fiber Connectors",
        question: "Fiber-optic cabling is terminated with what type of connector?",
        answers: ["RJ45", "ST", "RJ11", "DB9"],
        correct: 1,
        explanation: "ST is a fiber connector. RJ45 is for twisted-pair Ethernet copper cables, not fiber."
      },
      {
        topic: "DHCP DORA",
        question: "During the DHCP process, which stage sends an available IP address back to the client?",
        answers: ["Discover", "Offer", "Request", "Acknowledge"],
        correct: 1,
        explanation: "DORA = Discover, Offer, Request, Acknowledge. The server offers the address during the Offer stage."
      },
      {
        topic: "UDP",
        question: "Which TCP/IP protocol provides connectionless data transfer between hosts?",
        answers: ["TCP", "UDP", "IMAP", "FTP"],
        correct: 1,
        explanation: "UDP is connectionless. TCP is connection-oriented."
      },
      {
        topic: "IPv4 Classes",
        question: "Which of the following is a Class B IPv4 address?",
        answers: ["10.1.2.3", "172.16.5.4", "192.168.1.10", "224.1.1.1"],
        correct: 1,
        explanation: "Class B addresses begin with 128–191. 172.16.5.4 falls in that range."
      },
      {
        topic: "Wireless Devices",
        question: "Computers connecting to a wireless network typically connect through which device?",
        answers: ["WAP", "Switch", "Crimper", "Patch panel"],
        correct: 0,
        explanation: "A WAP, or wireless access point, provides wireless access to the network."
      },
      {
        topic: "Cable Tracing",
        question: "Which tool is best for finding the location of one wire inside a bundle of wires?",
        answers: ["Crimper", "Tone generator and probe", "Cable tester", "Punchdown tool"],
        correct: 1,
        explanation: "A tone generator sends a signal and the probe lets you trace that wire."
      },
      {
        topic: "OSI Data Units",
        question: "At the Data Link layer, data is packaged into what?",
        answers: ["Segments", "Packets", "Frames", "Bits"],
        correct: 2,
        explanation: "Layer 2 uses frames. Routers at Layer 3 work with packets."
      },
      {
        topic: "Cable Types",
        question: "Which pair of devices could traditionally use a crossover cable?",
        answers: ["PC to switch", "Router to switch", "Two computers", "PC to patch panel"],
        correct: 2,
        explanation: "A crossover cable could be used between two like devices, such as two computers."
      },
      {
        topic: "DMZ",
        question: "A public-facing web server should usually be placed in which area of the network?",
        answers: ["LAN", "DMZ", "SSID", "Workgroup"],
        correct: 1,
        explanation: "A DMZ is used for public-facing services while helping isolate them from the internal LAN."
      },
      {
        topic: "VLANs",
        question: "What is the main benefit of creating VLANs on a network?",
        answers: ["They increase screen brightness", "They reduce broadcast domains", "They replace routers", "They make cables fiber"],
        correct: 1,
        explanation: "VLANs logically separate networks and reduce broadcast domains."
      }
    ];

    const questionCount = document.getElementById("questionCount");
    const scoreCount = document.getElementById("scoreCount");
    const percentCount = document.getElementById("percentCount");
    const missionText = document.getElementById("missionText");
    const topicEl = document.getElementById("topic");
    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const feedbackEl = document.getElementById("feedback");
    const progressBar = document.getElementById("progressBar");
    const gameScreen = document.getElementById("gameScreen");
    const endScreen = document.getElementById("endScreen");
    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");
    const endBadge = document.getElementById("endBadge");
    const resetBtn = document.getElementById("resetBtn");
    const resetBtn2 = document.getElementById("resetBtn2");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const flash = document.getElementById("flash");

    let questions = [];
    let current = 0;
    let score = 0;
    let locked = false;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildGameQuestions() {
      return shuffle(originalQuestions).map(q => {
        const indexed = q.answers.map((text, i) => ({ text, i }));
        const mixed = shuffle(indexed);
        const newCorrect = mixed.findIndex(item => item.i === q.correct);
        return {
          topic: q.topic,
          question: q.question,
          answers: mixed.map(item => item.text),
          correct: newCorrect,
          explanation: q.explanation
        };
      });
    }

    function updateHUD() {
      questionCount.textContent = `${Math.min(current + 1, questions.length)} / ${questions.length}`;
      scoreCount.textContent = score;
      const percent = current === 0 ? 0 : Math.round((score / current) * 100);
      percentCount.textContent = `${percent}%`;
      progressBar.style.width = `${(current / questions.length) * 100}%`;
    }

    function loadQuestion() {
      locked = false;
      const q = questions[current];
      updateHUD();
      topicEl.textContent = q.topic;
      questionEl.textContent = q.question;
      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "Tap the best answer.";
      answersEl.innerHTML = "";

      q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.className = "answer";
        btn.innerHTML = `<strong>${String.fromCharCode(65 + index)}.</strong> ${answer}`;
        btn.addEventListener("click", () => selectAnswer(index, btn));
        answersEl.appendChild(btn);
      });
    }

    function showFlash(type) {
      flash.className = `flash ${type} show`;
      setTimeout(() => {
        flash.className = `flash ${type}`;
      }, 350);
    }

    function selectAnswer(index, clickedBtn) {
      if (locked) return;
      locked = true;

      const q = questions[current];
      const buttons = document.querySelectorAll(".answer");

      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add("correct");
      });

      if (index === q.correct) {
        score++;
        scoreCount.textContent = score;
        feedbackEl.className = "feedback good";
        feedbackEl.innerHTML = `✅ <strong>Correct.</strong> ${q.explanation}`;
        missionText.textContent = "Weak Spot Fixed";
        showFlash("good");
      } else {
        clickedBtn.classList.add("wrong");
        feedbackEl.className = "feedback bad";
        feedbackEl.innerHTML = `❌ <strong>Incorrect.</strong> ${q.explanation}`;
        missionText.textContent = "Review Needed";
        showFlash("bad");
      }

      setTimeout(() => {
        current++;
        if (current < questions.length) {
          missionText.textContent = "Fix the Weak Spots";
          loadQuestion();
        } else {
          finishGame();
        }
      }, 1800);
    }

    function finishGame() {
      progressBar.style.width = "100%";
      gameScreen.style.display = "none";
      endScreen.classList.add("show");
      finalScore.textContent = `${score} / ${questions.length}`;
      const pct = Math.round((score / questions.length) * 100);

      if (score === questions.length) {
        endBadge.textContent = "Perfect Network Recovery";
        finalMessage.textContent = "Outstanding. You cleaned up the exact concepts the class struggled with: fiber connectors, DHCP DORA, UDP, Class B, WAP, cable tracing, frames, crossover cables, DMZ, and VLANs.";
      } else if (score >= 8) {
        endBadge.textContent = "Exam Ready";
        finalMessage.textContent = `Strong job. You scored ${pct}% and look very close to test-ready. Run it again and try for a perfect 10.`;
      } else if (score >= 5) {
        endBadge.textContent = "Almost There";
        finalMessage.textContent = `You scored ${pct}%. Review DORA, frames vs packets, connectors, and wireless terms, then play again.`;
      } else {
        endBadge.textContent = "Needs Another Round";
        finalMessage.textContent = `You scored ${pct}%. This is a good sign that these weak concepts need one more class review before the exam.`;
      }

      missionText.textContent = "Mission Complete";
      percentCount.textContent = `${pct}%`;
    }

    function resetGame() {
      questions = buildGameQuestions();
      current = 0;
      score = 0;
      scoreCount.textContent = "0";
      percentCount.textContent = "0%";
      missionText.textContent = "Fix the Weak Spots";
      gameScreen.style.display = "block";
      endScreen.classList.remove("show");
      loadQuestion();
    }

    resetBtn.addEventListener("click", resetGame);
    resetBtn2.addEventListener("click", resetGame);
    playAgainBtn.addEventListener("click", resetGame);

    resetGame();
  </script>
</body>
</html>
